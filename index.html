<!DOCTYPE html>
<html>
<head>
<title>Living on the Edge</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    background: black;
    color: white;
    font-family: Comic Sans MS, sans-serif;
    font-size: 22px;
    padding: 20px;
}

#output {
    white-space: pre-wrap;
    line-height: 1.5;
}

button, select {
    font-size: 20px;
    padding: 10px;
    margin: 10px 0;
}
</style>

</head>

<body>

<h2>House Game</h2>

<select id="gameSelect">
    <option value="Normal1.txt">Game 1 (Normal)</option>
    <option value="Normal2.txt">Game 2 (Normal)</option>
    <option value="Normal3.txt">Game 3 (Normal)</option>
    <option value="HardMode1.txt">Game 1 (Hard Mode)</option>
    <option value="HardMode2.txt">Game 2 (Hard Mode)</option>
    <option value="HardMode3.txt">Game 3 (Hard Mode)</option>
</select>

<br>

<button onclick="loadGame()">START</button>

<div id="output">
Choose a game.
(Normal Mode: No zeroes, game guaranteed to end successfully, questions are always 50-50. Hard Mode: Zeroes added, game could end without victory and questions aren't 50-50.)
</div>

<br>

<button onclick="nextLine()">NEXT</button>

<script src="game.js"></script>

</body>
</html>
